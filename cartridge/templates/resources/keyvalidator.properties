# User-facing strings for the Key Validator BM extension.

keyvalidator.page.title=Key Validator
keyvalidator.page.subtitle=Verify that a Business Manager private key matches an encoded public key.
keyvalidator.page.footer=A fixed sample is signed with the referenced private key, then the signature is verified with the supplied public key. If verification succeeds, the keys are a pair.

keyvalidator.form.heading=Keypair Inputs
# The form-help message is split into three keys so the template can
# wrap the link text in an <a> tag without per-locale HTML in the
# bundle. Translators rephrase each segment as long as the order is
# preserved.
keyvalidator.form.help.before=Provide the alias of a private key configured in Business Manager (Administration > Operations >
keyvalidator.form.help.linkText=Private Keys and Certificates
keyvalidator.form.help.after=) and the encoded public key you want to verify against.

keyvalidator.form.privkeyid.label=Private Key Alias
keyvalidator.form.privkeyid.placeholder=my-signing-key
keyvalidator.form.privkeyid.hint=The alias as configured in Business Manager. Must reference an existing key.

keyvalidator.form.pubkey.label=Encoded Public Key
keyvalidator.form.pubkey.placeholder=MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEA...
keyvalidator.form.pubkey.hint=Base64-encoded public key, typically starting with "MII". PEM armor (-----BEGIN PUBLIC KEY-----) is also accepted.
keyvalidator.form.pubkey.strip=Strip to single line
keyvalidator.form.pubkey.strip.title=Remove the PEM armor lines and all whitespace. Useful for pasting into a DKIM DNS TXT record, where the key must be one continuous Base64 string.
keyvalidator.form.pubkey.copy=Copy
keyvalidator.form.pubkey.copy.title=Copy the public key to your clipboard.
keyvalidator.form.pubkey.copy.confirmed=Copied to clipboard
keyvalidator.form.pubkey.stripped.clean=Stripped PEM armor and line breaks.
keyvalidator.form.pubkey.stripped.spaces=Stripped PEM armor, line breaks, and a stray space or tab. Almost-right keys are easy to miss in copy/paste – check the source you copied from before publishing this key elsewhere.
# {0} = expected length, {1} = the alias's algorithm + size (e.g. "RSA / 2048"), {2} = actual stripped length.
keyvalidator.form.pubkey.fitness.lengthMismatch=Heads-up: this is {2} Base64 characters, but {1} keys encode to {0}. Verification will probably fail – check for an accidental truncation or a stray non-Base64 character.
keyvalidator.form.pubkey.fitness.familyMismatch=Heads-up: this looks like a different key family than {0}. Verification will fail unless the public key matches the private key's algorithm. Pick the right alias or paste the matching public key.

keyvalidator.form.algorithm.label=Signature Algorithm
keyvalidator.form.algorithm.hint=Picking an alias from the dropdown auto-sets this to a sensible default for that key''s family ({0} for RSA, SHA256withECDSA for EC). Override if your integration uses a different hash.

keyvalidator.form.submit=Verify
keyvalidator.form.reset=Reset

keyvalidator.result.heading=Result
keyvalidator.result.match.title=Keys match.
keyvalidator.result.match.body=The signature produced by the private key was successfully verified with the supplied public key.
keyvalidator.result.mismatch.title=Keys do not match.
keyvalidator.result.mismatch.body=The signature could not be verified with the supplied public key. Confirm that the public key corresponds to the referenced private key alias.
keyvalidator.result.error.title=Verification could not be completed.
keyvalidator.result.error.details=Details
keyvalidator.result.error.network=The verification request did not complete. Check your connection and try again.
keyvalidator.result.advisory.whitespace=The public key you supplied contains a stray space or tab. The platform's Base64 decoder tolerates this, but stricter consumers (DKIM DNS TXT record verifiers, third-party services) may not. Almost-right keys are easy to miss in copy/paste – check the source you copied from before publishing this key elsewhere.

keyvalidator.result.meta.algorithm=Algorithm

keyvalidator.error.missing.privkeyid=A private key alias is required.
keyvalidator.error.missing.pubkey=An encoded public key is required.
keyvalidator.error.malformed.pubkey=The public key value doesn't look like a valid Base64-encoded SubjectPublicKeyInfo. Paste the Base64 DER form (typically starting with "MII"), optionally PEM-armored.
keyvalidator.error.unsupported.algorithm=The selected algorithm is not supported.
keyvalidator.error.csrf=The form session expired or was tampered with. Please reload the page and try again.

# --- Aliases dropdown notices (shown next to the Private Key Alias input) ---
keyvalidator.aliases.loading=Loading aliases from this instance...
# The empty-state message is split into three keys for the same reason
# as keyvalidator.form.help.* above -- the client substitutes a real
# <a> node between the segments.
keyvalidator.aliases.empty.before=No private keys are imported on this instance yet. Import one in Administration > Operations >
keyvalidator.aliases.empty.linkText=Private Keys and Certificates
keyvalidator.aliases.empty.after=.
keyvalidator.aliases.populated.singular=1 private key found on this instance. Click the field or start typing to pick it.
keyvalidator.aliases.populated.plural={0} private keys found on this instance. Click the field or start typing to pick one.
keyvalidator.aliases.error.no_session=Could not load the alias list: no Business Manager session was detected.
keyvalidator.aliases.error.invalid_client=Could not load the alias list: the configured Account Manager client ID was rejected. Override it via the keyValidatorAMClientId site preference.
keyvalidator.aliases.error.invalid_grant=Could not load the alias list: your Business Manager session expired. Please reload the page.
keyvalidator.aliases.error.unauthorized=Could not load the alias list: none of your roles grants Read permission on Private Keys and Certificates (Administration > Organization > Roles & Permissions > Business Manager Modules). You can still enter the alias manually below.
keyvalidator.aliases.error.unavailable=Could not load the alias list: the OCAPI Data API was unreachable. You can still enter the alias manually.
keyvalidator.aliases.error.timeout=Could not load the alias list: the lookup timed out. You can still enter the alias manually.
keyvalidator.aliases.error.unknown=Could not load the alias list. You can still enter the alias manually.
